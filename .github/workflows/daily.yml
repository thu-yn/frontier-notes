name: 每日出版

on:
  schedule:
    - cron: "0 19 * * *" # UTC 19:00 = 北京时间次日 03:00
  workflow_dispatch: # 允许手动触发,方便测试

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取原始数据
        run: python scripts/fetch.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude 编辑总结
        uses: anthropics/claude-code-action@v1
        with:
          # 用 Claude 订阅额度:本地跑 `claude setup-token` 后存入仓库 secrets
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "请阅读 prompts/summarize.md 并严格按其中要求完成今天的编辑任务。"
          claude_args: '--model claude-opus-4-8 --allowedTools "Read,Glob,Grep,Write,Edit,Bash(python3 scripts/build.py)"'

      - name: 构建站点
        run: python scripts/build.py

      - name: 提交当日数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # claude-code-action 会覆盖 checkout 留下的凭证,这里显式用 GITHUB_TOKEN 推送
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add data/daily
          if git diff --cached --quiet; then
            echo "当日数据无变化,跳过提交"
          else
            git commit -m "第 $(date -u -d '+8 hours' +%F) 期"
            # 运行期间 main 可能有新提交(比如正好在本地推了改动),rebase 后再推
            git pull --rebase origin main
            git push origin HEAD:main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传站点产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
